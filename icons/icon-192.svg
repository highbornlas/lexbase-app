  <!-- Text -->
  <text x="96" y="130" text-anchor="middle" font-family="Georgia,serif" font-size="28" font-weight="700" fill="#c9a84c">LexBase</text>
  <text x="96" y="150" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" fill="#8a8070" letter-spacing="2">HUKUK</text>
</svg>
